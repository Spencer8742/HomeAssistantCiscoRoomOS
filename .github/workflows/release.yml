name: Release

# Auto-publishes a GitHub release whenever the integration's version changes on
# main. HACS installs from releases, so bumping the version in manifest.json and
# merging is all that's needed - this workflow tags vX.Y.Z and cuts the release,
# no manual click-through.

on:
  push:
    branches:
      - main
    paths:
      - custom_components/cisco_roomos/manifest.json
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest
        id: version
        run: |
          version=$(python3 -c "import json; print(json.load(open('custom_components/cisco_roomos/manifest.json'))['version'])")
          if [ -z "$version" ]; then
            echo "::error::Could not read version from manifest.json"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Manifest version: $version"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists; nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --generate-notes
